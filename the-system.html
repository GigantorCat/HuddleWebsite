  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.data && entry.url) { blobUrls[uuid] = entry.url; return; }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n    .pillar .icon circle{transition:fill .35s ease, transform .8s cubic-bezier(.4,0,.2,1)}\n    .pillar .icon path,.pillar .icon line{stroke:#c9c9c9;stroke-width:2.5;fill:none;transition:stroke .35s ease}\n    .pillar .icon .art-start,.pillar .icon .art-end{transition:opacity .5s ease}\n    .pillar .icon .art-end{opacity:0}\n    .pillar .icon .art-end path,.pillar .icon .art-end line,.pillar .icon .art-end .ring-line{\n      stroke:rgba(255,255,255,.6);fill:none;stroke-width:1.3;vector-effect:non-scaling-stroke}\n    .pillar.is-active .icon .art-start{opacity:0}\n    .pillar.is-active .icon .art-end{opacity:1;transition-delay:.25s}\n    .pillar.is-active .icon circle{transform:translate(var(--tx,0px),var(--ty,0px))}\n    .pillar .icon circle{fill:var(--pc)}\n    .pillar.is-active .bg{fill:var(--pc)}\n    .pillar.is-active .eyebrow{fill:rgba(255,255,255,.85)}\n    .pillar.is-active .label{fill:#fff}\n    .pillar.is-active .icon circle{fill:#fff}\n    .pillar.is-active .icon .art-start path,.pillar.is-active .icon .art-start line{stroke:rgba(0,0,0,.55)}\n    .pillar:focus-visible .bg{stroke:var(--pc);stroke-width:4}\n\n    .stage.engaged .pillar:not(.is-active) .icon circle{fill:#000}\n    .stage.engaged .pillar:not(.is-active) .icon circle.key{fill:var(--active-color);animation:pulse 1.4s ease-in-out infinite}\n    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.7);opacity:.65}}\n    .icon circle{transform-box:fill-box;transform-origin:center}\n\n    .flow path{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:1;stroke-dashoffset:1;\n      transition:stroke-dashoffset .7s ease .05s, opacity .2s ease;opacity:0;pointer-events:none}\n    .flow.on path{stroke-dashoffset:0;opacity:1}\n    .flow text{font-family:'Roboto';font-weight:500;font-size:22px;opacity:0;\n      transition:opacity .45s ease .55s;pointer-events:none}\n    .flow.on text{opacity:1}\n    #flow-diagnostic text{fill:var(--cyan)}\n    #flow-program text{fill:var(--       <circle cx=\"322\" cy=\"768\" r=\"7\" style=\"--tx:-7px;--ty:-14.1px\"><\/circle>\n            <circle cx=\"386\" cy=\"768\" r=\"7\" style=\"--tx:7px;--ty:-14.1px\"><\/circle>\n            <circle cx=\"354\" cy=\"785\" r=\"7\" style=\"--tx:-17.4px;--ty:-4px\"><\/circle>\n          <\/g>\n          <text class=\"label\" x=\"354\" y=\"835\" text-anchor=\"middle\">RECRUITMENT<\/text>\n        <\/g>\n\n        <g class=\"pillar\" id=\"p-program\" style=\"--pc:var(--pink)\" tabindex=\"0\" role=\"button\" aria-label=\"Program pillar\">\n          <circle class=\"bg\" cx=\"1046\" cy=\"760\" r=\"150\"><\/circle>\n          <text class=\"eyebrow\" x=\"1046\" y=\"685\" text-anchor=\"middle\">HUDDLE TEAM<\/text>\n          <g class=\"icon\">\n            <g class=\"art-start\"><path d=\"M996,790 L1086,712 M1086,712 h-28 M1086,712 v26\"><\/path><\/g>\n            <g class=\"art-end\">\n              <g transform=\"translate(986,702) scale(0.42)\">\n                <path vector-effect=\"non-scaling-stroke\" d=\"M7.33,219.69c24.28-1.61,249.7-27.33,285.54-205.77\"><\/path>\n              <\/g>\n            <\/g>\n            <circle cx=\"996\" cy=\"790\" r=\"7\" style=\"--tx:-4.2px;--ty:4.3px\"><\/circle>\n            <circle cx=\"1018\" cy=\"771\" r=\"7\" style=\"--tx:-5.9px;--ty:19.3px\"><\/circle>\n            <circle cx=\"1040\" cy=\"752\" r=\"7\" style=\"--tx:-5.5px;--ty:31.6px\"><\/circle>\n            <circle cx=\"1062\" cy=\"733\" r=\"7\" style=\"--tx:-5.8px;--ty:40.9px\"><\/circle>\n            <circle class=\"key\" cx=\"1086\" cy=\"712\" r=\"7\" style=\"--tx:23px;--ty:-4.2px\"><\/circle>\n            <circle cx=\"1058\" cy=\"712\" r=\"7\" style=\"--tx:40.1px;--ty:23.6px\"><\/circle>\n            <circle cx=\"1086\" cy=\"738\" r=\"7\" style=\"--tx:-6.9px;--ty:21px\"><\/circle>\n          <\/g>\n          <text class=\"label\" x=\"1046\" y=\"835\" text-anchor=\"middle\">PROGRAM<\/text>\n        <\/g>\n      <\/svg>\n\n      <div class=\"centre\">\n        <div class=\"panel idle-hint on\" data-panel=\"idle\">Roll over each pillar<br>to explore<\/div>\n        <div class=\"panel\" data-panel=\"diagnostic\">\n          <p class=\"mic\">See how your team actually operates. Everything starts with the data \u2014 nothing has to end there.<\/p>\n          <a class=\"cta\" href=\"#s-diagnostic\">LEARN MORE <span class=\"chev\">\u203a<\/span><\/a>\n        <\/div>\n        <div class=\"panel\" data-panel=\"program\">\n          <p class=\"mic\">You measure the what. This builds equal rigour on the how.<\/p>\n          <a class=\"cta\" href=\"#s-program\">LEARN MORE <span class=\"chev\">\u203a<\/span><\/a>\n        <\/div>\n        <div class=\"panel\" data-panel=\"recruitment\">\n          <p class=\"mic\">Hire for the team, not just the role.<\/p>\n          <a class=\"cta\" href=\"#s-recruitment\">LEARN MORE <span class=\"chev\">\u203a<\/span><\/a>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- DETAIL CARDS (ported) -->\n  <div class=\"cards\">\n    <section class=\"card card-diagnostic\" id=\"s-diagnostic\" data-screen-label=\"Diagnostic card\">\n      <div class=\"card-head\">\n        <div class=\"head-left\">\n          <h2 class=\"title\"><span class=\"lead\">Huddle Team<\/span><span class=\"pillar\">Diagnostic<\/span><\/h2>\n          <p class=\"anim-cap\"><span class=\"lite\">From<\/span><span class=\"w\">Diagnostic<\/span><span class=\"to\">to<\/span><b>Intelligence<\/b><span class=\"arw\">\u2192<\/span><\/p>\n        <\/div>\n        <div class=\"head-right\">\n          <div class=\"morph\">\n        <svg class=\"icon\" width=\"200\" height=\"137\" sc-camel-view-box=\"0 0 190 130\" aria-hidden=\"true\">\n          <g class=\"art-start\"><path d=\"M10,65 h30 l15,-30 l20,55 l20,-70 l20,45 h35 h30\"><\/path><\/g>\n          <g class=\"art-end\">\n            <g transform=\"translate(45,18) scale(1.5)\">\n              <path vector-effect=\"non-scaling-stroke\" d=\"M32.7,40.35l6.3,19s3.2-7.5,6.7-10.4,11.2-4.5,15.1-8.4c3.9-3.9,6.6-10.1,6.6-13.8,0-8.2-9.3-24-27.1-25.9-16.7-1.7-24.7.2-31.5,5.6C3.5,10.55-1.4,17.15,3.4,26.75c4.8,9.6,28,7.1,29.3,13.8\"><\/path>\n              <line vector-effect=\"non-scaling-stroke\" x1=\"2.8\" y1=\"26.25\" x2=\"66.2\" y2=\"21.35\"><\/line>\n              <line vector-effect=\"non-scaling-stroke\" x1=\"48.2\" y1=\"2.85\" x2=\"53.7\" y2=\"44.65\"><\/line>\n              <line vector-effect=\"non-scaling-stroke\" x1=\"10.2\" y1=\"5.45\" x2=\"30\" y2=\"37.65\"><\/line>\n              <line vector-effect=\"non-scaling-stroke\" x1=\"2.8\" y1=\"25.75\" x2=\"48.2\" y2=\"2.85\"><\/line>\n              <line vector-effect=\"non-scaling-stroke\" x1=\"10.2\" y1=\"5.45\" x2=\"66.2\" y2=\"21.35\"><\/line>\n              <line vector-effect=\"non-scaling-stroke\" x1=\"48.2\" y1=\"2.85\" x2=\"30\" y2=\"37.65\"><\/line>\n              <line vector-effect=\"non-scaling-stroke\" x1=\"10.2\" y1=\"5.45\" x2=\"53.7\" y2=\"44.65\"><\/line>\n              <line vector-effect=\"non-scaling-stroke\" x1=\"48.2\" y1=\"2.85\" x2=\"39.1\" y2=\"57.95\"><\/line>\n            <\/g>\n          <\/g>\n          <circle cx=\"17\" cy=\"65\" r=\"6\" style=\"--tx:32.2px;--ty:-7.6px\"><\/circle>\n          <circle cx=\"40\" cy=\"65\" r=\"6\" style=\"--tx:50px;--ty:9.5px\"><\/circle>\n          <circle cx=\"55\" cy=\"35\" r=\"6\" style=\"--tx:5.3px;--ty:-8.8px\"><\/circle>\n          <circle cx=\"75\" cy=\"90\" r=\"6\" style=\"--tx:28.7px;--ty:17.6px\"><\/circle>\n          <circle cx=\"95\" cy=\"20\" r=\"6\" style=\"--tx:22.3px;--ty:2.3px\"><\/circle>\n          <circle cx=\"115\" cy=\"65\" r=\"6\" style=\"--tx:10.6px;--ty:20px\"><\/circle>\n          <circle cx=\"150\" cy=\"65\" r=\"6\" style=\"--tx:-5.7px;--ty:-15px\"><\/circle>\n        <\/svg>\n          <\/div>\n        <\/div>\n      <\/div>\n      <p class=\"mic\">Built on research that explains up to 80% of whether a team performs.<\/p>\n      <p class=\"body\">Fixed scope. One leadership team. Four to six weeks. No retainer, no open-ended facilitation. The Diagnostic measures <strong>the conditions your team operates in \u2014 not the people in it<\/strong>. Every team member gets a voice. You get the data. And every people decision after this is intentional and evidence-based.<\/p>\n      <ul>\n        <li>Anonymous survey to every team member (~20 mins) plus stakeholder interviews<\/li>\n        <li>90-minute leader debrief \u2014 the findings come to you first<\/li>\n        <li>3.5 hours with the full team: the data itself, not a summary of it<\/li>\n        <li>One day together \u2014 not to talk about the team, but to be the team<\/li>\n        <li>Written diagnostic summary: the people decisions this team needs to make<\/li>\n      <\/ul>\n      <p class=\"meta\">One team<span>\u00b7<\/span>4\u20136 weeks<span>\u00b7<\/span>No ongoing retainer<\/p>\n    <\/section>\n\n    <section class=\"card card-program\" id=\"s-program\" data-screen-label=\"Program card\">\n      <div class=\"card-head\">\n        <div class=\"head-left\">\n          <h2 class=\"title\"><span class=\"lead\">Huddle Team<\/span><span class=\"pillar\">Program<\/span><\/h2>\n          <p class=\"anim-cap\"><span class=\"lite\">From<\/span><span class=\"w\">Program<\/span><span class=\"to\">to<\/span><b>Performance<\/b><span class=\"arw\">\u2192<\/span><\/p>\n        <\/div>\n        <div class=\"head-right\">\n          <div class=\"morph\">\n        <svg class=\"icon\" width=\"132\" height=\"120\" sc-camel-view-box=\"0 0 110 100\" aria-hidden=\"true\">\n          <g class=\"art-start\"><path d=\"M10,88 L100,10 M100,10 h-28 M100,10 v26\"><\/path><\/g>\n          <g class=\"art-end\">\n            <g transform=\"translate(5,14) scale(0.326)\">\n              <path vector-effect=\"non-scaling-stroke\" d=\"M7.33,219.69c24.28-1.61,249.7-27.33,285.54-205.77\"><\/path>\n            <\/g>\n          <\/g>\n          <circle cx=\"10\" cy=\"88\" r=\"6\" style=\"--tx:-0.5px;--ty:-2.4px\"><\/circle>\n          <circle cx=\"32\" cy=\"69\" r=\"6\" style=\"--tx:-6.8px;--ty:13.5px\"><\/circle>\n          <circle cx=\"54\" cy=\"50\" r=\"6\" style=\"--tx:-11.3px;--ty:27.3px\"><\/circle>\n          <circle cx=\"76\" cy=\"31\" r=\"6\" style=\"--tx:-16.5px;--ty:38.8px\"><\/circle>\n          <circle cx=\"100\" cy=\"10\" r=\"6\" style=\"--tx:0.5px;--ty:8.5px\"><\/circle>\n          <circle cx=\"72\" cy=\"10\" r=\"6\" style=\"--tx:20px;--ty:30.1px\"><\/circle>\n          <circle cx=\"100\" cy=\"36\" r=\"6\" style=\"--tx:-22.8px;--ty:22.2px\"><\/circle>\n        <\/svg>\n          <\/div>\n        <\/div>\n      <\/div>\n      <p class=\"mic\">There is no generic program. Your gaps define where the work goes.<\/p>\n      <p class=\"body\">Scorecards, KPIs, board reports \u2014 teams are already good at measuring <strong>the what<\/strong>. The Program builds equal rigour on <strong>the how<\/strong>: how the team actually works together to deliver those numbers, and where working better as a team would move them most. At its centre is intentional team leadership \u2014 a clear shared intent, and a measure of progress toward it every quarter.<\/p>\n      <ul>\n        <li>Quarterly feedback loop across both dimensions: what you deliver, and how you operate to deliver it<\/li>\n        <li>Real data on how the team is working together \u2014 not opinion, not vibes<\/li>\n        <li>Work targeted to this team's gaps: dynamics, development, systems, coaching<\/li>\n      <\/ul>\n      <p class=\"meta\">Quarterly rhythm<span>\u00b7<\/span>Data-directed<span>\u00b7<\/span>Built from your diagnostic<\/p>\n    <\/section>\n\n    <section class=\"card card-recruitment\" id=\"s-recruitment\" data-screen-label=\"Recruitment card\">\n      <div class=\"card-head\">\n        <div class=\"head-left\">\n          <h2 class=\"title\"><span class=\"lead\">Huddle Team<\/span><span class=\"pillar\">Recruitment<\/span><\/h2>\n          <p class=\"anim-cap\"><span class=\"lite\">From<\/span><span class=\"w\">Recruitment<\/span><span class=\"to\">to<\/span><b>Integration<\/b><span class=\"arw\">\u2192<\/span><\/p>\n        <\/div>\n        <div class=\"head-right\">\n          <div class=\"morph\">\n        <svg class=\"icon\" width=\"116\" height=\"116\" sc-camel-view-box=\"0 0 100 100\" aria-hidden=\"true\">\n          <g class=\"art-start\">\n            <line x1=\"10\" y1=\"50\" x2=\"90\" y2=\"50\"><\/line>\n            <line x1=\"50\" y1=\"10\" x2=\"50\" y2=\"90\"><\/line>\n          <\/g>\n          <g class=\"art-end\"><circle class=\"ring-line\" cx=\"50\" cy=\"50\" r=\"40\"><\/circle><\/g>\n          <circle cx=\"50\" cy=\"10\" r=\"6\" style=\"--tx:0px;--ty:0px\"><\/circle>\n          <circle cx=\"18\" cy=\"27\" r=\"6\" style=\"--tx:0.7px;--ty:-2px\"><\/circle>\n          <circle cx=\"82\" cy=\"27\" r=\"6\" style=\"--tx:-0.7px;--ty:-1.9px\"><\/circle>\n          <circle cx=\"50\" cy=\"50\" r=\"6\" style=\"--tx:17.4px;--ty:36px\"><\/circle>\n          <circle cx=\"18\" cy=\"73\" r=\"6\" style=\"--tx:-7px;--ty:-14.1px\"><\/circle>\n          <circle cx=\"82\" cy=\"73\" r=\"6\" style=\"--tx:7px;--ty:-14.1px\"><\/circle>\n          <circle cx=\"50\" cy=\"90\" r=\"6\" style=\"--tx:-17.4px;--ty:-4px\"><\/circle>\n        <\/svg>\n          <\/div>\n        <\/div>\n      <\/div>\n      <p class=\"mic\">The diagnostic runs before the search \u2014 so team fit is measured, never assumed.<\/p>\n      <p class=\"body\">Most executive searches define fit by skills and experience, then hope the team part works out. This one starts with something more fundamental: <strong>how your team operates and what it needs to win<\/strong>. That data shapes the search criteria, the market map and the shortlist \u2014 so team alignment is assessed alongside capability from the first conversation, not applied as a filter at the end.<\/p>\n      <ul>\n        <li>Diagnostic-informed search criteria \u2014 the team defines the brief, not just the role<\/li>\n        <li>Market map and shortlist shaped around how the team operates<\/li>\n        <li>Team launch once the person starts \u2014 shared clarity from day one<\/li>\n        <li>Quarterly measurement through the first year: alignment tracked, not assumed<\/li>\n      <\/ul>\n      <p class=\"meta\">Search + diagnostic<span>\u00b7<\/span>Team launch<span>\u00b7<\/span>First-year feedback loop<\/p>\n    <\/section>\n  <\/div>\n\n  <!-- FOOTER (site-wide component) -->\n  <x-import component-from-global-scope=\"huddle-footer\" from=\"40d32faa-0b5d-45fa-ae19-2f962bc7bf04#/huddle-footer.js\" hint-size=\"100%,540px\"><\/x-import>\n\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    // Guard against a hot-reload leaving a second animation loop / renderer\n    // running on top of the previous one (they would fight over the fades).\n    if (window.__huddlePillarRaf) cancelAnimationFrame(window.__huddlePillarRaf);\n    if (window.__huddlePillarRenderer) { try { window.__huddlePillarRenderer.dispose(); } catch (e) {} }\n    this._reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this._mountStageOverlay();\n    this._initPillars();\n    this._whenReady(() => this._initThree());\n  }\n\n  // Move the interactive SVG system into the pinned hero, so it overlays the\n  // top-down 3D pillars \u2014 the pillars appear to become the infographic.\n  _mountStageOverlay() {\n    const host = document.getElementById('stage-host');\n    const stage = document.getElementById('stage');\n    if (host && stage && stage.parentElement !== host) host.appendChild(stage);\n  }\n\n  componentWillUnmount() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._st) this._st.kill();\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n    if (this._renderer) this._renderer.dispose();\n  }\n\n  _whenReady(cb) {\n    const ok = () => window.THREE;\n    if (ok()) return cb();\n    let n = 0;\n    const id = setInterval(() => {\n      if (ok()) { clearInterval(id); cb(); }\n      else if (n++ > 200) { clearInterval(id); }\n    }, 50);\n  }\n\n  /* ---------- interactive top-down system (ported) ---------- */\n  _initPillars() {\n    const stage = document.getElementById('stage');\n    if (!stage) return;\n    const pillars = {\n      diagnostic: document.getElementById('p-diagnostic'),\n      program: document.getElementById('p-program'),\n      recruitment: document.getElementById('p-recruitment'),\n    };\n    const flows = {\n      diagnostic: document.getElementById('flow-diagnostic'),\n      program: document.getElementById('flow-program'),\n      recruitment: document.getElementById('flow-recruitment'),\n    };\n    const colors = { diagnostic: '#00B9DA', program: '#F2065B', recruitment: '#F7AA00' };\n    const panels = document.querySelectorAll('.centre .panel');\n    let active = null;\n    const hoverCapable = window.matchMedia('(hover: hover)').matches;\n\n    const setState = (name) => {\n      if (active === name) return;\n      active = name;\n      stage.classList.toggle('engaged', !!name);\n      if (name) stage.style.setProperty('--active-color', colors[name]);\n      Object.entries(pillars).forEach(([k, el]) => el && el.classList.toggle('is-active', k === name));\n      Object.entries(flows).forEach(([k, el]) => el && el.classList.toggle('on', k === name));\n      panels.forEach((p) => p.classList.toggle('on', p.dataset.panel === (name || 'idle')));\n    };\n\n    Object.entries(pillars).forEach(([name, el]) => {\n      if (!el) return;\n      if (hoverCapable) el.addEventListener('pointerenter', () => setState(name));\n      el.addEventListener('click', () => setState(active === name ? null : name));\n      el.addEventListener('keydown', (e) => {\n        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setState(active === name ? null : name); }\n      });\n    });\n    if (hoverCapable) stage.addEventListener('pointerleave', () => setState(null));\n\n    // LEARN MORE + nav smooth-scroll (scrollIntoView is banned)\n    document.querySelectorAll('a[href^=\"#s-\"]').forEach((a) => {\n      a.addEventListener('click', (e) => {\n        const t = document.querySelector(a.getAttribute('href'));\n        if (!t) return;\n        e.preventDefault();\n        const top = t.getBoundingClientRect().top + window.scrollY - 30;\n        window.scrollTo({ top, behavior: 'smooth' });\n      });\n    });\n  }\n\n  /* ---------- Three.js crane-shot hero ---------- */\n  _initThree() {\n      // Mobile fallback: skip the 3D crane shot, show hero copy + interactive\n      // system as a normal static section (per spec: reduced/low-power path).\n      if (window.matchMedia('(max-width: 820px)').matches) {\n        const pin0 = document.getElementById('hero-pin');\n        const sticky0 = pin0 && pin0.firstElementChild;\n        const canvas0 = document.getElementById('pillar-canvas');\n        const cue0 = document.getElementById('scroll-cue');\n        const heroCopy0 = document.getElementById('hero-copy');\n        const stageHost0 = document.getElementById('stage-host');\n        if (canvas0) canvas0.style.display = 'none';\n        if (cue0) cue0.style.display = 'none';\n        if (pin0) pin0.style.height = 'auto';\n        if (sticky0) { sticky0.style.position = 'static'; sticky0.style.height = 'auto'; sticky0.style.overflow = 'visible'; }\n        if (heroCopy0) { heroCopy0.style.position = 'static'; heroCopy0.style.inset = 'auto'; heroCopy0.style.padding = '13vh 24px 5vh'; heroCopy0.style.pointerEvents = 'auto'; }\n        if (stageHost0) { stageHost0.style.position = 'static'; stageHost0.style.inset = 'auto'; stageHost0.style.opacity = '1'; stageHost0.style.pointerEvents = 'auto'; stageHost0.style.padding = '2vh 0 8vh'; }\n        return;\n      }\n      const THREE = window.THREE;\n    const canvas = document.getElementById('pillar-canvas');\n    if (!canvas || !THREE) return;\n\n    const scene = new THREE.Scene();\n    scene.background = new THREE.Color(0x0a0a0a);\n\n    const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 200);\n\n    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    this._renderer = renderer;\n    window.__huddlePillarRenderer = renderer;\n\n    // Lighting: low ambient + overhead point light with falloff => bases fade to black\n    scene.add(new THREE.AmbientLight(0x8a8a8a, 0.18));\n    const key = new THREE.PointLight(0xffffff, 2.6, 48, 2);\n    key.position.set(0, 13, 0);\n    scene.add(key);\n    const fill = new THREE.DirectionalLight(0xbfd0dd, 0.35);\n    fill.position.set(-4, 6, -10);\n    scene.add(fill);\n\n    // Pillars \u2014 top-down positions match the SVG triangle (Diagnostic top,\n    // Recruitment bottom-left, Program bottom-right). World = SVG / 100, centred.\n    const mat = new THREE.MeshStandardMaterial({ color: 0x9a9a9a, roughness: 0.86, metalness: 0.0 });\n    const H = 24, R = 1.55;   // tuned so the projected top disc == the SVG circle radius\n    const makePillar = (x, z, topY) => {\n      const geo = new THREE.CylinderGeometry(R, R, H, 64);\n      const m = new THREE.Mesh(geo, mat);\n      m.position.set(x, topY - H / 2, z);\n      scene.add(m);\n      return m;\n    };\n    // Positions chosen so the top-down view matches the SVG triangle exactly.\n    makePillar(0, 4, 1.1);        // Diagnostic \u2014 tallest; +z lands it at the TOP of top-down\n    makePillar(3.46, -2, 0);      // Recruitment \u2014 bottom-left of top-down\n    makePillar(-3.46, -2, 0);     // Program \u2014 bottom-right of top-down\n    // (No ground ring \u2014 the ring belongs to the SVG infographic, which appears later.)\n\n    const heroCopy = document.getElementById('hero-copy');\n    const scrollCue = document.getElementById('scroll-cue');\n\n    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));\n    const smooth = (t) => t * t * (3 - 2 * t);\n    const lerp = (a, b, t) => a + (b - a) * t;\n\n    let target = 0;   // scroll progress 0..1\n    let cur = 0;      // smoothed (crane feel)\n\n    const resize = () => {\n      const w = canvas.clientWidth || window.innerWidth;\n      const h = canvas.clientHeight || window.innerHeight;\n      renderer.setSize(w, h, false);\n      camera.aspect = w / h;\n      camera.updateProjectionMatrix();\n    };\n    this._onResize = () => { resize(); if (window.ScrollTrigger) window.ScrollTrigger.refresh(); };\n    window.addEventListener('resize', this._onResize);\n    resize();\n\n    const place = (p) => {\n      const e = smooth(clamp(p / 0.4, 0, 1));         // crane completes by 40%, then a static hold\n      const dist = lerp(17, 25, e);                   // starts further back, dollies out as it cranes up\n      const lookY = lerp(3.4, 0, e);                  // raised horizon at the front: pillars sit low, text has open space above\n      const theta = (12 + 78 * e) * Math.PI / 180;    // elevation 12deg -> 90deg (straight down)\n      const ct = Math.cos(theta), st = Math.sin(theta);\n      camera.position.set(0, lookY + dist * st, -dist * ct);\n      // Flip-free crane: the up vector stays in the Y-Z plane, rotating +y (front)\n      // -> +z (overhead). The camera's right axis never inverts, so it never rolls\n      // upside down; it simply tips from a front view to looking straight down.\n      camera.up.set(0, ct, st);\n      camera.lookAt(0, lookY, 0);\n    };\n\n    if (this._reduced) {\n      // TODO reduced-motion fallback: skip the crane, show the infographic statically.\n      place(0);\n      renderer.render(scene, camera);\n      canvas.style.opacity = '0';\n      const sh = document.getElementById('stage-host');\n      if (sh) { sh.style.opacity = '1'; sh.style.pointerEvents = 'auto'; }\n      return;\n    }\n\n    // Drive progress directly from the pinned section's scroll position \u2014 robust,\n    // no ScrollTrigger dependency (the project ships duplicate GSAP instances).\n    const pin = document.getElementById('hero-pin');\n    const readTarget = () => {\n      const vh = window.innerHeight || 800;\n      const rect = pin.getBoundingClientRect();\n      const scrollable = rect.height - vh;\n      target = scrollable > 0 ? clamp(-rect.top / scrollable, 0, 1) : 0;\n    };\n    const stageHost = document.getElementById('stage-host');\n    const ring = document.querySelector('#stage .ring');\n    const idleHint = document.querySelector('.centre .panel.idle-hint');\n\n    // Prime the ring for a draw-in, and hide the hint until last.\n    let ringLen = 2513;\n    if (ring) {\n      try { ringLen = ring.getTotalLength() || ringLen; } catch (e) {}\n      ring.style.strokeDasharray = String(ringLen);\n      ring.style.strokeDashoffset = String(ringLen);\n      ring.style.opacity = '0';\n    }\n    if (idleHint) idleHint.style.opacity = '0';\n\n    // Once the SVG circles have fully crossfaded in, the remaining beats\n    // (ring draw -> hint -> interactivity) play themselves on a timer \u2014 NOT\n    // tied to further scrolling. So the moment the infographic lands it\n    // completes and becomes interactive on its own.\n    let handedOff = false;\n    const runHandoff = () => {\n      if (handedOff) return;\n      handedOff = true;\n      if (stageHost) { stageHost.style.opacity = '1'; stageHost.style.pointerEvents = 'auto'; }\n      if (ring) {\n        ring.style.transition = 'stroke-dashoffset 1s cubic-bezier(.4,0,.2,1), opacity .35s ease';\n        ring.style.opacity = '1';\n        requestAnimationFrame(() => { ring.style.strokeDashoffset = '0'; });\n      }\n      clearTimeout(this._hintT);\n      this._hintT = setTimeout(() => {\n        if (idleHint) { idleHint.style.transition = 'opacity .6s ease'; idleHint.style.opacity = ''; }\n      }, 820);\n    };\n    const resetHandoff = () => {\n      if (!handedOff) return;\n      handedOff = false;\n      clearTimeout(this._hintT);\n      if (stageHost) stageHost.style.pointerEvents = 'none';\n      if (ring) { ring.style.transition = 'none'; ring.style.opacity = '0'; ring.style.strokeDashoffset = String(ringLen); }\n      if (idleHint) { idleHint.style.transition = 'none'; idleHint.style.opacity = '0'; }\n    };\n\n    const applyFades = (p) => {\n      if (heroCopy) {\n        heroCopy.style.opacity = String(clamp(1 - p / 0.16, 0, 1));\n        heroCopy.style.transform = `translateY(${(-3 * clamp(p, 0, 0.4)).toFixed(2)}vh)`;\n      }\n      if (scrollCue) scrollCue.style.opacity = String(clamp(1 - p / 0.1, 0, 1));\n\n      // The crane finishes by ~0.4 and holds a locked straight-down view.\n      // Scroll drives ONLY the eased crossfade of the 3D pillars -> SVG circles\n      // (0.46\u20130.60). Everything after that is self-playing (see runHandoff).\n      const cross = smooth(clamp((p - 0.46) / 0.14, 0, 1));\n      canvas.style.opacity = String(1 - cross);\n      if (stageHost && !handedOff) stageHost.style.opacity = String(cross);\n      if (cross >= 1) runHandoff();\n      else resetHandoff();\n    };\n\n    const loop = () => {\n      readTarget();\n      cur += (target - cur) * 0.35;   // light smoothing only; stays synced to scroll\n      if (Math.abs(target - cur) < 0.0012) cur = target;\n      place(cur);\n      applyFades(cur);\n      renderer.render(scene, camera);\n      this._raf = requestAnimationFrame(loop);\n      window.__huddlePillarRaf = this._raf;\n    };\n    readTarget();\n    place(target);\n    cur = target;\n    loop();\n  }\n\n  renderVals() {\n    return { year: new Date().getFullYear() };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"
