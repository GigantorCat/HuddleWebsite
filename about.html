document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));

    return btoa(bin);

    // events at the element — warn only; real JS errors carry message/error.

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.data && entry.url) { blobUrls[uuid] = entry.url; return; }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();

            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);

          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ll-color: transparent; color: transparent\">{{ m.position }}<\/div>\n            \n            <div style=\"font-family: 'Roboto',sans-serif; font-weight: 300; font-size: 13px; line-height: 1.45; color: #9d9d9d; max-width: 200px; padding-top: 10px; padding-bottom: 10px\">{{ m.catch }}<\/div>\n          <\/div>\n         <\/div>\n        <\/sc-for>\n      <\/div>\n    <\/div>\n\n  <\/div>\n<\/section>\n\n<!-- ================= QUOTE PANEL (moved from landing page) ================= -->\n<x-import component-from-global-scope=\"huddle-quote\" from=\"f549d9fb-77c0-4acd-a2fc-5bea202def6c#/huddle-quote.js\" hint-size=\"100%,220vh\"><\/x-import>\n\n<!-- ================= FOOTER (site-wide component) ================= -->\n<x-import component-from-global-scope=\"huddle-footer\" from=\"734a5570-72a5-4946-953d-8f3e80d0799f#/huddle-footer.js\" hint-size=\"100%,540px\"><\/x-import>\n\n\n<!-- ================= FLIP-TO-BIO MODAL ================= -->\n<div sc-camel-on-click=\"{{ close }}\" style=\"{{ overlayStyle }}\">\n  <div sc-camel-on-click=\"{{ stop }}\" style=\"{{ dialogStyle }}\">\n    <div style=\"{{ flipStyle }}\">\n\n      <!-- FRONT -->\n      <div style=\"position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;overflow:hidden;background:#0d0d0d;border:1px solid #232323;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 36px\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#03C3DD,#0D6CCE,#F2065B,#F96816)\"><\/div>\n        <div style=\"position:relative;width:210px;height:210px;border-radius:50%;box-shadow:0 0 40px -8px rgba(242,6,91,.35)\">\n          <div style=\"position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 210deg,#03C3DD,#2f86dd,#6b5cd6,#b74fbf,#F2065B,#f85a3b,#F96816,#F9AE06,#03C3DD)\"><\/div>\n          <div style=\"position:absolute;inset:7px;border-radius:50%;overflow:hidden;background:repeating-linear-gradient(45deg,#141414 0,#141414 13px,#181818 13px,#181818 26px);display:flex;align-items:center;justify-content:center\"><span style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#4a4a4a\">Headshot<\/span><\/div>\n        <\/div>\n        <div style=\"margin-top:26px;font-family:'Poppins',sans-serif;font-weight:700;font-size:32px;line-height:1.06;color:#fff\">{{ sel.name }}<\/div>\n        <div style=\"margin-top:9px;font-family:'Roboto',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;background:linear-gradient(90deg,#03C3DD,#0D6CCE,#F2065B,#F96816);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">{{ sel.position }}<\/div>\n        <div style=\"margin-top:16px;max-width:30ch;font-family:'Roboto',sans-serif;font-weight:300;font-style:italic;font-size:16px;line-height:1.5;color:#a6a6a6\">\u201c{{ sel.catch }}\u201d<\/div>\n        <div style=\"margin-top:26px\"><span sc-camel-on-click=\"{{ flip }}\" style=\"cursor:pointer;display:inline-flex;align-items:center;gap:9px;font-family:'Poppins',sans-serif;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#fff;padding:11px 20px;border-radius:999px;border:1px solid transparent;background:linear-gradient(#101010,#101010) padding-box,linear-gradient(90deg,#03C3DD,#F2065B,#F96816) border-box\">Read bio <span style=\"font-size:14px\">\u21bb<\/span><\/span><\/div>\n      <\/div>\n\n      <!-- BACK -->\n      <div style=\"position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(180deg);border-radius:20px;overflow:hidden;background:#0d0d0d;border:1px solid #232323;display:flex;flex-direction:column\">\n        <div style=\"position:relative;padding:26px 30px 20px;border-bottom:1px solid #1c1c1c\">\n          <div style=\"position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#03C3DD,#0D6CCE,#F2065B,#F96816)\"><\/div>\n          <div style=\"font-family:'Roboto',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;background:linear-gradient(90deg,#03C3DD,#0D6CCE,#F2065B,#F96816);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">{{ sel.position }}<\/div>\n          <div style=\"margin-top:6px;font-family:'Poppins',sans-serif;font-weight:700;font-size:28px;color:#fff\">{{ sel.name }}<\/div>\n        <\/div>\n        <div style=\"flex:1;overflow-y:auto;padding:24px 30px 26px\">\n          <div style=\"font-family:'Roboto',sans-serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;background:linear-gradient(90deg,#03C3DD,#F2065B,#F96816);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;margin-bottom:14px\">My story<\/div>\n          <sc-for list=\"{{ sel.story }}\" as=\"para\" hint-placeholder-count=\"2\">\n            <p style=\"margin:0 0 15px;font-family:'Roboto',sans-serif;font-weight:300;font-size:16px;line-height:1.72;color:#cccccc\">{{ para }}<\/p>\n          <\/sc-for>\n\n          <div style=\"font-family:'Roboto',sans-serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;background:linear-gradient(90deg,#03C3DD,#F2065B,#F96816);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;margin:28px 0 15px\">Areas of expertise<\/div>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n            <sc-for list=\"{{ sel.expertise }}\" as=\"tag\" hint-placeholder-count=\"3\">\n              <span style=\"font-family:'Roboto',sans-serif;font-size:13.5px;color:#e2e2e2;padding:7px 15px;border-radius:999px;border:1px solid #2a2a2a;background:#141414\">{{ tag }}<\/span>\n            <\/sc-for>\n          <\/div>\n\n          <div style=\"font-family:'Roboto',sans-serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;background:linear-gradient(90deg,#03C3DD,#F2065B,#F96816);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;margin:30px 0 16px\">Get in touch<\/div>\n          <div style=\"display:flex;flex-direction:column;gap:16px\">\n            <a href=\"{{ sel.emailHref }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;text-decoration:none\">\n              <span style=\"font-family:'Roboto',sans-serif;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#6f6f6f\">Email<\/span>\n              <span style=\"flex:1;height:1px;background:#1e1e1e\"><\/span>\n              <span style=\"font-family:'Roboto',sans-serif;font-size:15px;background:linear-gradient(90deg,#03C3DD,#0D6CCE,#F2065B,#F96816);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">{{ sel.email }}<\/span>\n            <\/a>\n            <a href=\"{{ sel.telHref }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;text-decoration:none\">\n              <span style=\"font-family:'Roboto',sans-serif;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#6f6f6f\">Phone<\/span>\n              <span style=\"flex:1;height:1px;background:#1e1e1e\"><\/span>\n              <span style=\"font-family:'Roboto',sans-serif;font-size:15px;color:#e2e2e2\">{{ sel.phone }}<\/span>\n            <\/a>\n            <a href=\"{{ sel.linkedin }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;text-decoration:none\">\n              <span style=\"font-family:'Roboto',sans-serif;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#6f6f6f\">LinkedIn<\/span>\n              <span style=\"flex:1;height:1px;background:#1e1e1e\"><\/span>\n              <span style=\"font-family:'Roboto',sans-serif;font-size:15px;background:linear-gradient(90deg,#03C3DD,#0D6CCE,#F2065B,#F96816);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">View profile \u2192<\/span>\n            <\/a>\n          <\/div>\n        <\/div>\n        <div style=\"padding:16px 30px;border-top:1px solid #1c1c1c\">\n          <span sc-camel-on-click=\"{{ flip }}\" style=\"cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-family:'Roboto',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9a9a9a\">\u21a9 Back to card<\/span>\n        <\/div>\n      <\/div>\n\n    <\/div>\n    <div sc-camel-on-click=\"{{ close }}\" style=\"{{ closeStyle }}\">\u00d7<\/div>\n  <\/div>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1040}}\">\nclass Component extends DCLogic {\n  state = { selId: null, open: false, flipped: false };\n\n  componentDidMount() {\n    this._onKey = (e) => { if (e.key === 'Escape') this._close(); };\n    window.addEventListener('keydown', this._onKey);\n\n    const v = document.getElementById('heroVid');\n    if (v) {\n      const set = () => { try { v.muted = true; v.defaultMuted = true; v.playbackRate = 0.5; } catch (e) {} };\n      const kick = () => { set(); const p = v.play(); if (p && p.catch) p.catch(() => {}); };\n      set(); kick();\n      v.addEventListener('loadedmetadata', kick);\n      v.addEventListener('canplay', kick);\n      v.addEventListener('play', set);\n      // Fallback: some environments block autoplay until a user gesture.\n      const once = () => { kick(); window.removeEventListener('pointerdown', once); window.removeEventListener('scroll', once); };\n      window.addEventListener('pointerdown', once);\n      window.addEventListener('scroll', once, { passive: true });\n    }\n\n    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    setTimeout(() => {\n      const els = [...document.querySelectorAll('[data-reveal]')];\n      els.forEach((el) => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(22px)';\n        el.style.transition = 'opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1)';\n      });\n      const io = new IntersectionObserver((ents) => {\n        ents.forEach((e) => {\n          if (!e.isIntersecting) return;\n          const el = e.target;\n          el.style.transitionDelay = (el.__d || 0) + 'ms';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          io.unobserve(el);\n        });\n      }, { threshold: 0.12 });\n      els.forEach((el, i) => { el.__d = (i % 8) * 55; io.observe(el); });\n    }, 80);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('keydown', this._onKey);\n    clearTimeout(this._flipT);\n  }\n\n  _open(m) {\n    clearTimeout(this._flipT);\n    // Open straight to the bio detail (no front-card zoom first).\n    this.setState({ selId: m.id, open: true, flipped: true });\n  }\n  _close() {\n    clearTimeout(this._flipT);\n    this.setState({ open: false });\n  }\n\n  _data() {\n    const mk = (accent, o) => ({\n      accent,\n      emailHref: 'mailto:' + o.email,\n      telHref: 'tel:' + o.phone.replace(/\\s/g, ''),\n      linkedin: '#',\n      ...o,\n    });\n    const directors = [\n      mk('#F9AE06', {\n        id: 'cliff', num: '01', name: 'Cliff Wilson', position: 'Director & Founder',\n        catch: 'Great teams don\\u2019t just happen.',\n        email: 'cliff@huddlepartners.com.au', phone: '+61 400 000 001',\n        expertise: ['Team strategy', 'Executive coaching', 'Culture design'],\n        story: [\n          'Cliff started Huddle after two decades leading teams and watching brilliant strategies stall on the people. The pattern was always the same \\u2014 the plan was fine, the team wasn\\u2019t set up to run it.',\n          'He built Huddle to fix that with evidence instead of instinct: measure how a team actually operates, then make every decision from there. Great teams, he\\u2019ll tell you, don\\u2019t just happen \\u2014 they get built on purpose.',\n        ],\n      }),\n      mk('#F9AE06', {\n        id: 'michael', num: '02', name: 'Michael Buckley', position: 'Director of Talent',\n        catch: 'Hire for the team, not the seat.',\n        email: 'michael@huddlepartners.com.au', phone: '+61 400 000 002',\n        expertise: ['Executive search', 'Talent strategy', 'Assessment'],\n        story: [\n          'Michael has spent his career on the other side of the hire \\u2014 placing executives and then watching whether they stuck. Too often, technically perfect appointments came apart on team fit.',\n          'At Huddle he leads Talent: searches that start with the team\\u2019s data, so alignment is measured from the first conversation instead of hoped for at the end.',\n        ],\n      }),\n    ];\n    const staff = [\n      mk('#03C3DD', {\n        id: 'veronica', num: '03', name: 'Veronica Byrne', position: 'Business Manager',\n        catch: 'Keeps the whole squad moving.',\n        email: 'veronica@huddlepartners.com.au', phone: '+61 400 000 003',\n        expertise: ['Operations', 'Client success', 'Finance'],\n        story: [\n          'Veronica keeps every engagement on the rails \\u2014 timelines, clients, and the thousand details that make a diagnostic feel effortless from the outside.',\n          'She ran operations across professional services before Huddle, and joined because she wanted the work to genuinely change how teams function, not just tick along.',\n        ],\n      }),\n      mk('#03C3DD', {\n        id: 'cat', num: '04', name: 'Cat Ryan', position: 'Head of Marketing & Design',\n        catch: 'Makes the work impossible to ignore.',\n        email: 'cat@huddlepartners.com.au', phone: '+61 400 000 004',\n        expertise: ['Brand', 'Content', 'Design systems'],\n        story: [\n          'Cat leads how Huddle looks, sounds and shows up \\u2014 from the brand itself to the diagnostic reports clients actually want to read.',\n          'She\\u2019s happiest turning something complex into something clear, and mildly obsessed with getting the small details right.',\n        ],\n      }),\n      mk('#03C3DD', {\n        id: 'sam', num: '05', name: 'Sam Okafor', position: 'Diagnostic Lead',\n        catch: 'Reads what the scoreboard can\\u2019t.',\n        email: 'sam@huddlepartners.com.au', phone: '+61 400 000 005',\n        expertise: ['Team diagnostics', 'Data analysis', 'Facilitation'],\n        story: [\n          'Sam turns raw survey data into the story of how a team really operates \\u2014 and where one small change would move the most.',\n          'A background in organisational psychology and a stubborn belief that the scoreboard never tells the whole story.',\n        ],\n      }),\n      mk('#03C3DD', {\n        id: 'priya', num: '06', name: 'Priya Nair', position: 'People Scientist',\n        catch: 'Turns signals into decisions.',\n        email: 'priya@huddlepartners.com.au', phone: '+61 400 000 006',\n        expertise: ['Behavioural science', 'Psychometrics', 'Research'],\n        story: [\n          'Priya makes sure everything Huddle measures is grounded in real behavioural science, not consulting folklore.',\n          'She designs the instruments behind the diagnostic and translates the signals into decisions leaders can actually act on.',\n        ],\n      }),\n      mk('#03C3DD', {\n        id: 'jordan', num: '07', name: 'Jordan Ellis', position: 'Program Coach',\n        catch: 'Better every quarter.',\n        email: 'jordan@huddlepartners.com.au', phone: '+61 400 000 007',\n        expertise: ['Team coaching', 'Leadership development', 'Facilitation'],\n        story: [\n          'Jordan runs the quarterly Program \\u2014 the coaching rhythm that keeps a team improving on the how, not just the what.',\n          'A former performance coach, he treats team development like training blocks: clear intent, and a measure of progress every quarter.',\n        ],\n      }),\n      mk('#03C3DD', {\n        id: 'tom', num: '08', name: 'Tom Fletcher', position: 'Recruitment Partner',\n        catch: 'Finds the missing piece.',\n        email: 'tom@huddlepartners.com.au', phone: '+61 400 000 008',\n        expertise: ['Executive search', 'Market mapping', 'Onboarding'],\n        story: [\n          'Tom partners with clients through executive search \\u2014 mapping the market and finding the person the team is actually missing.',\n          'He\\u2019d rather present three genuinely right people than thirty CVs, and he tracks fit through the first year, not just to the offer.',\n        ],\n      }),\n    ];\n    const wire = (m) => ({\n      ...m,\n      open: () => this._open(m),\n      keydown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this._open(m); } },\n    });\n    return { directors: directors.map(wire), staff: staff.map(wire) };\n  }\n\n  renderVals() {\n    const { directors, staff } = this._data();\n    const all = [...directors, ...staff];\n    const sel = all.find((m) => m.id === this.state.selId) || {\n      accent: '#03C3DD', num: '', name: '', position: '', catch: '',\n      story: [], expertise: [], email: '', phone: '', emailHref: '#', telHref: '#', linkedin: '#',\n    };\n    const open = this.state.open;\n    const flipped = this.state.flipped;\n\n    return {\n      directors, staff, sel,\n      close: () => this._close(),\n      flip: () => this.setState((s) => ({ flipped: !s.flipped })),\n      stop: (e) => e.stopPropagation(),\n      overlayStyle: {\n        position: 'fixed', inset: 0, zIndex: 300, display: 'flex',\n        alignItems: 'center', justifyContent: 'center', padding: '24px',\n        background: 'rgba(5,5,5,.8)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',\n        opacity: open ? 1 : 0, visibility: open ? 'visible' : 'hidden',\n        pointerEvents: open ? 'auto' : 'none',\n        transition: 'opacity .4s ease, visibility .4s ease',\n      },\n      dialogStyle: {\n        position: 'relative', perspective: '1900px',\n        transform: open ? 'scale(1)' : 'scale(.94)', opacity: open ? 1 : 0,\n        transition: 'transform .5s cubic-bezier(.2,.8,.2,1), opacity .4s ease',\n      },\n      flipStyle: {\n        position: 'relative', width: '560px', maxWidth: '92vw', height: '720px', maxHeight: '90vh',\n        transformStyle: 'preserve-3d',\n        transition: 'transform .85s cubic-bezier(.2,.8,.2,1)',\n        transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)',\n      },\n      closeStyle: {\n        position: 'absolute', top: '-16px', right: '-16px', width: '38px', height: '38px',\n        borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',\n        cursor: 'pointer', background: '#141414', border: '1px solid #2a2a2a', color: '#cfcfcf',\n        fontSize: '22px', lineHeight: 1, zIndex: 5,\n      },\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
